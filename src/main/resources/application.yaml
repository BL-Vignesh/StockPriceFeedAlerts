server:
  port: 8080

spring:
  application:
    name: realtime-portfolio-alerts

  # ── PostgreSQL (US1, US2, US4, US5, US6) ──────────────────────
  datasource:
    url: jdbc:postgresql://localhost:5432/portfolio_db?options=-c%20TimeZone=Asia/Kolkata
    username: postgres
    password: 1234
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        jdbc:
          time_zone: Asia/Kolkata
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  # ── Kafka (US9) ────────────────────────────────────────────────
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: portfolio-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
        spring.json.value.default.type: com.portfolio.stockpricefeed.entities.StockPriceEvent
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

# ── JWT (US2) ───────────────────────────────────────────────────
app:
  jwt:
    secret: ${JWT_SECRET:3cfa76ef14937c1c0ea519f8fc057a80fcd04a7420f8e8bcd0a7567c272e007b}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}   # 24 hours

# ── Logging ─────────────────────────────────────────────────────
logging:
  level:
    com.portfolio.stockpricefeed: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: DEBUG